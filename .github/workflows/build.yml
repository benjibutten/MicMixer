name: Candidate build

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: candidate-${{ github.ref }}
  cancel-in-progress: true

env:
  SOLUTION_PATH: MicMixer.slnx
  PROJECT_PATH: src/MicMixer/MicMixer.csproj
  RUNTIME_ID: win-x64

jobs:
  candidate:
    runs-on: windows-latest

    steps:
      - name: Checkout selected branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 10.0.x

      - name: Compute candidate metadata
        id: meta
        shell: pwsh
        run: |
          $safeRef = "${{ github.ref_name }}" -replace '[^A-Za-z0-9._-]', '-'
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          "asset_name=MicMixer-candidate-$safeRef-$shortSha-win-x64.zip" >> $env:GITHUB_OUTPUT

      - name: Restore solution
        shell: pwsh
        run: dotnet restore $env:SOLUTION_PATH -r $env:RUNTIME_ID -p:PublishReadyToRun=true

      - name: Run full test suite
        shell: pwsh
        run: dotnet test $env:SOLUTION_PATH -c Release --no-restore

      - name: Publish candidate
        shell: pwsh
        run: |
          $publishDir = Join-Path $PWD "artifacts/publish/$env:RUNTIME_ID"
          dotnet publish $env:PROJECT_PATH `
            -c Release `
            -r $env:RUNTIME_ID `
            --no-restore `
            --self-contained true `
            -p:ContinuousIntegrationBuild=true `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=false `
            -p:PublishReadyToRun=true `
            -p:InformationalVersion="candidate+${{ github.sha }}" `
            -o $publishDir

      - name: Package candidate
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $zipPath = Join-Path $PWD "artifacts/${{ steps.meta.outputs.asset_name }}"
          Compress-Archive -Path "artifacts/publish/$env:RUNTIME_ID/*" -DestinationPath $zipPath
          $hash = (Get-FileHash -LiteralPath $zipPath -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  ${{ steps.meta.outputs.asset_name }}" | Set-Content -Path "$zipPath.sha256" -NoNewline

      - name: Upload candidate artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: micmixer-candidate-${{ github.run_id }}
          path: |
            artifacts/${{ steps.meta.outputs.asset_name }}
            artifacts/${{ steps.meta.outputs.asset_name }}.sha256
          if-no-files-found: error
